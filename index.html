<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoLens • Free Maps</title>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<style>
body {
  margin: 0;
  background: #111;
  color: #eee;
  font-family: Arial, sans-serif;
  text-align: center;
}

header {
  padding: 1rem;
  font-size: 1.8rem;
  font-weight: bold;
}

#uploadBox {
  margin: 2rem auto;
  border: 2px dashed #444;
  padding: 2rem;
  width: 90%;
  max-width: 400px;
  border-radius: 12px;
  cursor: pointer;
}
#uploadBox:hover {
  border-color: #666;
}

#map {
  width: 100%;
  height: 350px;
  margin-top: 1rem;
  border-radius: 8px;
}

#results {
  text-align: left;
  margin: 1rem auto;
  padding: 1rem;
  background: #222;
  width: 90%;
  max-width: 600px;
  border-radius: 8px;
  font-size: 0.9rem;
  line-height: 1.4rem;
  word-break: break-word;
}
</style>
</head>

<body>

<header>📍 GeoLens (Free Maps Edition)</header>

<div id="uploadBox" onclick="document.getElementById('imageInput').click();">
  Drop or click to upload an image
</div>

<input
  id="imageInput"
  type="file"
  accept="image/*"
  style="display:none"
  onchange="handleImage(this.files[0])"
/>

<div id="results"></div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exif-js"></script>

<script>
let map;

// initialize base map
function initMap() {
  map = L.map('map').setView([0, 0], 2);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);
}

function handleImage(file) {
  document.getElementById('results').textContent = 'Scanning...';

  const reader = new FileReader();
  reader.onload = function (e) {
    const blob = e.target.result;
    window.EXIF.getData(blob, function () {
      const lat = EXIF.getTag(this, "GPSLatitude");
      const lng = EXIF.getTag(this, "GPSLongitude");

      let out = '';

      if (lat && lng) {
        out += `📍 GPS Found: ${lat}, ${lng}\n`;
        showMarker(lat, lng);
      } else {
        out += `🔍 No GPS metadata found.\n`;
      }

      document.getElementById('results').textContent = out;
    });
  };
  reader.readAsArrayBuffer(file);
}

function showMarker(lat, lng) {
  if (!map) initMap();

  const coords = [
    lat[0] + lat[1]/60 + lat[2]/3600,
    lng[0] + lng[1]/60 + lng[2]/3600
  ];

  map.setView(coords, 10);

  L.marker(coords).addTo(map)
    .bindPopup("📍 Photo Location")
    .openPopup();
}

initMap();
</script>

</body>
</html>
