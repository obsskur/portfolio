<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pinball Test</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #000;
    overflow: hidden;
  }
  canvas {
    width: 100vw;
    height: 100vh;
    display: block;
    background: #111;
  }
</style>
</head>
<body>

<canvas id="pinball"></canvas>

<script>
const canvas = document.getElementById("pinball");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.onresize = resize;

// Simple test ball
let ball = { x: 200, y: 200, vx: 120, vy: 0, r: 12 };

function loop(dt) {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // gravity
  ball.vy += 0.4;

  // move
  ball.x += ball.vx * dt;
  ball.y += ball.vy * dt;

  // bounce walls
  if (ball.x < ball.r || ball.x > canvas.width - ball.r) ball.vx *= -1;
  if (ball.y < ball.r || ball.y > canvas.height - ball.r) ball.vy *= -1;

  // draw
  ctx.fillStyle = "cyan";
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
  ctx.fill();

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>

</body>
</html>
