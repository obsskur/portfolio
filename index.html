<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FPV Drone Free Roam</title>
<style>
    body { margin: 0; overflow: hidden; background: black; }
    #info {
        position: absolute;
        top: 10px;
        left: 10px;
        color: white;
        font-family: Arial;
        font-size: 14px;
    }
</style>
</head>
<body>
<div id="info">
Click to start<br>
WASD Move | Mouse Look<br>
Space/Shift = Up/Down<br>
Right Shift = Boost
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
let scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x87ceeb, 10, 300);

let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Lighting
let light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(1,2,1);
scene.add(light);

// Drone rig
let drone = new THREE.Object3D();
scene.add(drone);
drone.add(camera);
camera.position.set(0, 0.5, 0);

// Controls
let keys = {};
let velocity = new THREE.Vector3();
let accel = 0.02;
let maxSpeed = 0.5;

let pitch = 0, yaw = 0;

document.body.onclick = () => document.body.requestPointerLock();

document.addEventListener("mousemove", e => {
    if (document.pointerLockElement === document.body) {
        yaw -= e.movementX * 0.002;
        pitch -= e.movementY * 0.002;
        pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
    }
});

document.addEventListener("keydown", e => keys[e.code] = true);
document.addEventListener("keyup", e => keys[e.code] = false);

// Terrain
const chunkSize = 50;
const renderDistance = 3;
let chunks = {};

function noise(x, z) {
    return Math.sin(x*0.08)*Math.cos(z*0.08)*8 + Math.sin(x*0.02)*5;
}

// Tree
function createTree(x, z) {
    let group = new THREE.Group();

    let trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.5, 0.5, 5),
        new THREE.MeshBasicMaterial({ color: 0x8b5a2b })
    );

    let leaves = new THREE.Mesh(
        new THREE.SphereGeometry(3),
        new THREE.MeshBasicMaterial({ color: 0x2e8b57 })
    );

    trunk.position.y = 2.5;
    leaves.position.y = 6;

    group.add(trunk);
    group.add(leaves);

    group.position.set(x, noise(x,z), z);
    return group;
}

function createChunk(cx, cz) {
    let group = new THREE.Group();

    let geo = new THREE.PlaneGeometry(chunkSize, chunkSize, 16, 16);
    geo.rotateX(-Math.PI/2);

    let pos = geo.attributes.position;
    for (let i = 0; i < pos.count; i++) {
        let x = pos.getX(i) + cx*chunkSize;
        let z = pos.getZ(i) + cz*chunkSize;
        pos.setY(i, noise(x,z));
    }

    let mesh = new THREE.Mesh(
        geo,
        new THREE.MeshBasicMaterial({ color: 0x1e2b1e, wireframe: true })
    );

    mesh.position.set(cx*chunkSize, 0, cz*chunkSize);
    group.add(mesh);

    // Add trees
    for (let i=0;i<5;i++) {
        let tx = cx*chunkSize + Math.random()*chunkSize;
        let tz = cz*chunkSize + Math.random()*chunkSize;
        group.add(createTree(tx,tz));
    }

    scene.add(group);
    return group;
}

function updateChunks() {
    let cx = Math.floor(drone.position.x / chunkSize);
    let cz = Math.floor(drone.position.z / chunkSize);

    let needed = {};

    for (let x=-renderDistance;x<=renderDistance;x++) {
        for (let z=-renderDistance;z<=renderDistance;z++) {
            let key = (cx+x)+","+(cz+z);
            needed[key] = true;

            if (!chunks[key]) {
                chunks[key] = createChunk(cx+x, cz+z);
            }
        }
    }

    for (let key in chunks) {
        if (!needed[key]) {
            scene.remove(chunks[key]);
            delete chunks[key];
        }
    }
}

// Movement
function updateMovement() {
    let forward = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw));
    let right = new THREE.Vector3().crossVectors(forward, new THREE.Vector3(0,1,0));

    if (keys["KeyW"]) velocity.addScaledVector(forward, accel);
    if (keys["KeyS"]) velocity.addScaledVector(forward, -accel);
    if (keys["KeyA"]) velocity.addScaledVector(right, -accel);
    if (keys["KeyD"]) velocity.addScaledVector(right, accel);

    if (keys["Space"]) velocity.y += accel;
    if (keys["ShiftLeft"]) velocity.y -= accel;

    // Boost
    let currentMax = keys["ShiftRight"] ? 1.2 : maxSpeed;

    velocity.clampLength(0, currentMax);
    velocity.multiplyScalar(0.95); // drag

    drone.position.add(velocity);

    // Ground collision
    let ground = noise(drone.position.x, drone.position.z) + 1;
    if (drone.position.y < ground) {
        drone.position.y = ground;
        velocity.y = 0;
    }

    // FPV tilt effect
    drone.rotation.set(
        pitch + velocity.z * -0.5,
        yaw,
        -velocity.x * 0.5
    );
}

// Animate
function animate() {
    requestAnimationFrame(animate);
    updateMovement();
    updateChunks();
    renderer.render(scene, camera);
}
animate();

// Resize
window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
