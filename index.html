<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Portfolio</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      background: #0a0a0a;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    /* Flowing tie-dye style background */
    body::before {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background: radial-gradient(circle at 30% 30%, #1a1a1a, transparent 40%),
                  radial-gradient(circle at 70% 70%, #2a2a2a, transparent 40%),
                  radial-gradient(circle at 50% 50%, #141414, transparent 60%);
      animation: flow 20s infinite linear;
      z-index: -1;
    }

    @keyframes flow {
      0% {
        transform: rotate(0deg) scale(1);
      }
      50% {
        transform: rotate(180deg) scale(1.2);
      }
      100% {
        transform: rotate(360deg) scale(1);
      }
    }

    /* Optional subtle noise overlay */
    body::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR4nGNgYAAAAAMAASsJTYQAAAAASUVORK5CYII=');
      opacity: 0.05;
      pointer-events: none;
    }
      .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 90px;
      background: #000000;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 0 20px;
    }

    .skill {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #e5e5e5;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .skill img {
      height: 32px;
      width: auto;
      object-fit: contain;
    }

    .skill img {
      height: 28px;
      width: auto;
      filter: brightness(0.9);
    }

    .title {
      color: #e5e5e5;
      font-size: 28px;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

  <div class="top-bar">

    <div class="skill">
      <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/python/python-original.svg" alt="Python">
      <span>Python</span>
    </div>

    <div class="skill">
      <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/html5/html5-original.svg" alt="HTML5">
      <span>HTML5</span>
    </div>

    <div class="skill">
      <img src="https://www.pngaaa.com/api/download/3893766" alt="Roblox Studio">
      <span style="font-weight:600;">Roblox Studio</span>
    </div>

    <div class="skill">
      <img src="https://www.pngkey.com/png/full/30-303938_roblox-logo-png-transparent-background-roblox-logo.png" alt="Roblox">
      <span style="font-weight:600;">Roblox</span>
    </div>

  </div>

    <div class="skill">
      <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/html5/html5-original.svg" alt="HTML5">
      <span>HTML5</span>
    </div>

    <div class="skill">
      <img src="https://upload.wikimedia.org/wikipedia/commons/6/6c/Roblox_Studio_logo_-_2022.svg" alt="Roblox Studio" style="filter: invert(1);">
      <span>Roblox Studio</span>
    </div>

    <div class="skill">
      <img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Roblox_Logo_2022.svg" alt="Roblox" style="filter: invert(1);">
      <span>Roblox</span>
    </div>
  </div>
  </div>

</body>
</html>
