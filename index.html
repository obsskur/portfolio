<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Portfolio</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      background: #0a0a0a;
      overflow: hidden;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    /* Background */
    body::before {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background: radial-gradient(circle at 30% 30%, #1a1a1a, transparent 40%),
                  radial-gradient(circle at 70% 70%, #222, transparent 40%),
                  radial-gradient(circle at 50% 50%, #141414, transparent 60%);
      animation: flow 20s infinite linear;
      z-index: -1;
    }

    @keyframes flow {
      0% { transform: rotate(0deg) scale(1); }
      50% { transform: rotate(180deg) scale(1.1); }
      100% { transform: rotate(360deg) scale(1); }
    }

    /* Top bar */
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 85px;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 60px;
      z-index: 10;
      border-bottom: 1px solid #111;
    }

    /* Each item */
    .skill {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #eaeaea;
      font-size: 14px;
      font-weight: 500;
      opacity: 0.85;
      transition: all 0.2s ease;
    }

    .skill:hover {
      opacity: 1;
      transform: translateY(-1px);
    }

    .skill img {
      height: 26px;
      object-fit: contain;
    }

    /* Roblox logos (clean white) */
    .roblox-logo {
      filter: brightness(0) invert(1);
      height: 20px;
    }

    .roblox-studio {
      height: 24px;
    }

  </style>
</head>
<body>

  <div class="top-bar">

    <div class="skill">
      <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/python/python-original.svg" alt="Python">
      <span>Python</span>
    </div>

    <div class="skill">
      <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/html5/html5-original.svg" alt="HTML5">
      <span>HTML5</span>
    </div>

    <div class="skill">
      <img class="roblox-studio" src="https://devforum-uploads.s3.dualstack.us-east-2.amazonaws.com/uploads/original/4X/1/6/c/16c497209dbd4b0288f790fb3d3da55db21f74d0.png" alt="Roblox Studio">
      <span>Roblox Studio</span>
    </div>

    <div class="skill">
      <img class="roblox-logo" src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Roblox_Logo_2022.svg" alt="Roblox">
      <span>Roblox</span>
    </div>

  </div>

</body>
</html>
