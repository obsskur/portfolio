<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Portfolio</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      background: #0a0a0a;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    /* Flowing tie-dye style background */
    body::before {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background: radial-gradient(circle at 30% 30%, #1a1a1a, transparent 40%),
                  radial-gradient(circle at 70% 70%, #2a2a2a, transparent 40%),
                  radial-gradient(circle at 50% 50%, #141414, transparent 60%);
      animation: flow 20s infinite linear;
      z-index: -1;
    }

    @keyframes flow {
      0% {
        transform: rotate(0deg) scale(1);
      }
      50% {
        transform: rotate(180deg) scale(1.2);
      }
      100% {
        transform: rotate(360deg) scale(1);
      }
    }

    /* Optional subtle noise overlay */
    body::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR4nGNgYAAAAAMAASsJTYQAAAAASUVORK5CYII=');
      opacity: 0.05;
      pointer-events: none;
    }
  </style>
</head>
<body>

</body>
</html>
