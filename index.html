<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Portfolio</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      background: #050505;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    /* Stronger flowing tie-dye background */
    body::before {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;

      background:
        radial-gradient(circle at 20% 30%, rgba(80,80,80,0.25), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(120,120,120,0.2), transparent 45%),
        radial-gradient(circle at 50% 50%, rgba(60,60,60,0.3), transparent 55%),
        radial-gradient(circle at 30% 80%, rgba(100,100,100,0.15), transparent 50%);

      filter: blur(60px);
      animation: flow 25s ease-in-out infinite alternate;
      z-index: -1;
    }

    @keyframes flow {
      0% {
        transform: rotate(0deg) scale(1);
      }
      50% {
        transform: rotate(120deg) scale(1.15);
      }
      100% {
        transform: rotate(240deg) scale(1);
      }
    }

    /* Subtle grain for texture */
    body::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR4nGNgYAAAAAMAASsJTYQAAAAASUVORK5CYII=');
      opacity: 0.08;
      pointer-events: none;
    }
  </style>
</head>
<body>

</body>
</html>
