<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Void Wallet</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
--bg:#07080c;
--card:#111317;
--border:#1c1f24;
--text:#f1f1f1;
--muted:#7a7a7a;
--accent:#7c3aed;
}
*{box-sizing:border-box;margin:0}
body{
font-family:Inter,sans-serif;
background:var(--bg);
color:var(--text);
padding:30px;
}
h1{font-size:34px;margin-bottom:5px}
p{color:var(--muted)}
.grid{
display:grid;
grid-template-columns:1.2fr .8fr;
gap:20px;
margin-top:20px;
}
.card{
background:var(--card);
border:1px solid var(--border);
border-radius:14px;
padding:18px;
}
.asset{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid var(--border);
cursor:pointer;
}
input,select,button{
width:100%;
padding:10px;
margin-top:10px;
background:#0d0f13;
border:1px solid var(--border);
color:white;
border-radius:8px;
}
.activity{
font-size:13px;
border-bottom:1px solid var(--border);
padding:6px 0;
color:var(--muted);
}
</style>
</head>

<body>

<h1 id="balance">$0</h1>
<p>Total Balance</p>

<div class="grid">
<div class="card">
<h3>Assets</h3>
<div id="assets"></div>
</div>

<div class="card">
<h3>Actions</h3>

<input id="amount" placeholder="Amount">

<div class="row">
<select id="from"></select>
<select id="to"></select>
</div>

<button onclick="swap()">Swap</button>
<button onclick="send()">Send</button>
<button onclick="receive()">Receive</button>

<p>Output: <span id="output">0</span></p>

</div>
</div>

<div class="card" style="margin-top:20px">
<h3>Activity</h3>
<div id="activity"></div>
</div>

<script>
const prices={BTC:67000,ETH:3500,SOL:180,USDC:1};

let wallet={
BTC:0.5,
ETH:3,
SOL:10,
USDC:2000
};

function total(){
let t=0;
for(let c in wallet){t+=wallet[c]*prices[c]}
document.getElementById("balance").innerText="$"+t.toFixed(2);
}

function renderAssets(){
let el=document.getElementById("assets");
el.innerHTML="";
for(let c in wallet){
let val=wallet[c]*prices[c];
el.innerHTML+=`
<div class="asset">
<span>${c} (${wallet[c].toFixed(4)})</span>
<span>$${val.toFixed(2)}</span>
</div>`;
}
}

function loadSelects(){
let f=document.getElementById("from");
let t=document.getElementById("to");
for(let c in wallet){
f.innerHTML+=`<option>${c}</option>`;
t.innerHTML+=`<option>${c}</option>`;
}
}

function log(txt){
document.getElementById("activity").innerHTML=
`<div class="activity">${txt}</div>`+
document.getElementById("activity").innerHTML;
}

function swap(){
let amt=parseFloat(amount.value);
let f=from.value;
let t=to.value;
if(wallet[f]<amt)return;
let usd=amt*prices[f];
let out=usd/prices[t];
wallet[f]-=amt;
wallet[t]+=out;
output.innerText=out.toFixed(4);
log(`Swapped ${amt} ${f} → ${out.toFixed(4)} ${t}`);
refresh();
}

function send(){
let amt=parseFloat(amount.value);
let f=from.value;
if(wallet[f]<amt)return;
wallet[f]-=amt;
log(`Sent ${amt} ${f}`);
refresh();
}

function receive(){
let amt=parseFloat(amount.value);
let t=to.value;
wallet[t]+=amt;
log(`Received ${amt} ${t}`);
refresh();
}

function simulate(){
for(let c in prices){
prices[c]*=(1+(Math.random()-0.5)/40);
}
refresh();
}

function refresh(){
renderAssets();
total();
}

setInterval(simulate,4000);

loadSelects();
refresh();
</script>

</body>
</html>
