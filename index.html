<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Carbon Arcade • Pinball</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg-main: #050505;
      --bg-panel: #0b0b0d;
      --accent: #4da3ff;
      --accent-soft: #2b6bbf;
      --accent-glow: rgba(77, 163, 255, 0.35);
      --text-main: #f5f5f7;
      --text-soft: #a0a0aa;
      --border-subtle: #1a1a20;
      --radius-lg: 22px;
      --radius-md: 14px;
      --radius-sm: 9px;
      --transition-fast: 160ms ease-out;
      --transition-med: 260ms ease-out;
      --transition-slow: 420ms ease-out;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at top, #15151c 0, #050505 55%, #000 100%);
      color: var(--text-main);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "SF Pro Display", "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .app-shell {
      position: relative;
      width: min(1200px, 100%);
      height: min(720px, 100%);
      background: radial-gradient(circle at top left, #181820 0, #050507 55%, #020203 100%);
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.03);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.85);
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
      backdrop-filter: blur(26px) saturate(140%);
      animation: shellIntro var(--transition-slow) ease-out;
    }

    @keyframes shellIntro {
      from {
        opacity: 0;
      transform: translateY(18px) scale(0.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px 10px 20px;
      background: linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0.04),
        rgba(255, 255, 255, 0.01)
      );
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(18px);
      z-index: 2;
    }

    .window-controls {
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 11px;
      height: 11px;
      border-radius: 999px;
      background: #ff5f57;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.6);
    }

    .dot:nth-child(2) {
      background: #febc2e;
    }

    .dot:nth-child(3) {
      background: #28c840;
    }

    .title-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      pointer-events: none;
      user-select: none;
    }

    .title-main {
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-main);
      opacity: 0.9;
    }

    .title-sub {
      font-size: 11px;
      color: var(--text-soft);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .pill {
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: radial-gradient(circle at top, #181822, #050507);
      color: var(--text-soft);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      opacity: 0.9;
    }

    .pill span.key {
      padding: 2px 6px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.04);
      font-size: 10px;
      color: var(--text-main);
    }

    .btn-primary {
      position: relative;
      padding: 7px 16px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: radial-gradient(circle at top, #2b6bbf, #0b1a2b);
      color: var(--text-main);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      overflow: hidden;
      transition: background var(--transition-med), transform var(--transition-fast),
        box-shadow var(--transition-fast), border-color var(--transition-fast);
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.6), 0 0 24px rgba(77, 163, 255, 0.25);
    }

    .btn-primary::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top left, rgba(255, 255, 255, 0.18), transparent 55%);
      opacity: 0;
      transition: opacity var(--transition-med);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      background: radial-gradient(circle at top, #3f8cff, #10213a);
      border-color: rgba(77, 163, 255, 0.7);
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.7), 0 0 32px rgba(77, 163, 255, 0.4);
    }

    .btn-primary:hover::before {
      opacity: 1;
    }

    .btn-primary:active {
      transform: translateY(0);
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.8), 0 0 18px rgba(77, 163, 255, 0.3);
    }

    .content {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 1.8fr);
      gap: 18px;
      padding: 16px 18px 18px 18px;
    }

    @media (max-width: 900px) {
      .content {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
      }
    }

    /* Left: library */

    .library-panel {
      border-radius: var(--radius-lg);
      background: linear-gradient(
        145deg,
        rgba(255, 255, 255, 0.02),
        rgba(255, 255, 255, 0.01)
      );
      border: 1px solid rgba(255, 255, 255, 0.04);
      padding: 16px 16px 18px 16px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(18px);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .section-title {
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .badge {
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      background: radial-gradient(circle at top, rgba(77, 163, 255, 0.18), transparent 60%);
    }

    .game-card {
      position: relative;
      border-radius: var(--radius-md);
      background: radial-gradient(circle at top left, #101018, #050507);
      border: 1px solid rgba(255, 255, 255, 0.06);
      padding: 14px;
      display: grid;
      grid-template-columns: 80px minmax(0, 1fr);
      gap: 12px;
      cursor: pointer;
      overflow: hidden;
      transition: transform var(--transition-med), box-shadow var(--transition-med),
        border-color var(--transition-med), background var(--transition-med);
    }

    .game-card::before {
      content: "";
      position: absolute;
      inset: -40%;
      background: conic-gradient(
        from 180deg,
        rgba(77, 163, 255, 0.18),
        transparent,
        transparent,
        rgba(77, 163, 255, 0.18),
        transparent
      );
      opacity: 0;
      mix-blend-mode: screen;
      transition: opacity var(--transition-med), transform var(--transition-med);
      transform: translate3d(-10px, -10px, 0);
    }

    .game-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.9);
      border-color: rgba(77, 163, 255, 0.7);
      background: radial-gradient(circle at top left, #151524, #050507);
    }

    .game-card:hover::before {
      opacity: 1;
      transform: translate3d(0, 0, 0);
    }

    .game-thumb {
      border-radius: 16px;
      background: radial-gradient(circle at center, #ff00ff, #5500aa, #050007);
      border: 1px solid rgba(255, 255, 255, 0.12);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .game-thumb::after {
      content: "";
      position: absolute;
      width: 140%;
      height: 40%;
      background: linear-gradient(
        to right,
        transparent,
        rgba(255, 255, 255, 0.4),
